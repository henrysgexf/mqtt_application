name: CI for Linux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgl1-mesa-dev \
          libxkbcommon-x11-dev \
          libxcb-randr0-dev \
          libxcb-util-dev \
          libxcb-keysyms1-dev \
          libxcb-cursor-dev \
          libxcb-xinerama0-dev \
          libxcb-icccm4-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb-sync-dev \
          libxcb-xkb-dev \
          libxcb-dri3-dev \
          libx11-xcb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libxrender-dev \
          libxi-dev \
          libxrandr-dev \
          libxfixes-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libwayland-egl-backend-dev
        sudo apt install -y \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libswscale-dev \
          libswresample-dev \
          libavfilter-dev \
          libavdevice-dev

    # ========== 重构的 vcpkg 安装步骤 ==========
    - name: Setup vcpkg (latest)
      run: |
        VCPKG_ROOT="${{ runner.workspace }}/vcpkg"
        echo "VCPKG_ROOT=${VCPKG_ROOT}" >> $GITHUB_ENV
        echo "${VCPKG_ROOT}" >> $GITHUB_PATH

        # 克隆 vcpkg 仓库（默认最新 master）
        git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"

        # 运行 bootstrap 脚本编译 vcpkg 工具
        "${VCPKG_ROOT}/bootstrap-vcpkg.sh"

        # 验证安装
        vcpkg --version

    - name: Install Qt6 and other dependencies via vcpkg
      run: |
        vcpkg install --classic \
          qt6 qt6-mqtt \
          protobuf abseil \
          --triplet x64-linux
      shell: bash

    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ runner.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      env:
        VCPKG_DEFAULT_TRIPLET: x64-linux

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    - name: Prepare runtime directory
      run: |
        mkdir -p package/usr/bin
        cp ${{ github.workspace }}/build/Application package/usr/bin/
        cp ${{ github.workspace }}/style.qss package/usr/bin/

    - name: Copy system libraries (simple approach)
      run: |
        mkdir -p package/usr/lib
        ldd package/usr/bin/Application | grep "=> /" | awk '{print $3}' | xargs -I '{}' cp -v '{}' package/usr/lib/ || true
        # 添加 Qt 插件路径（可选）
        QT_PLUGIN_PATH="${{ runner.workspace }}/vcpkg/installed/x64-linux/bin/plugins"
        if [ -d "$QT_PLUGIN_PATH" ]; then
          cp -r "$QT_PLUGIN_PATH" package/usr/bin/plugins
        fi

    - name: Create run script
      run: |
        cat > package/run.sh << 'EOF'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        export LD_LIBRARY_PATH="$DIR/usr/lib:$LD_LIBRARY_PATH"
        exec "$DIR/usr/bin/Application" "$@"
        EOF
        chmod +x package/run.sh

    - name: Package into tar.gz
      run: tar -czf Application-linux-x86_64.tar.gz -C package .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Application-Linux
        path: Application-linux-x86_64.tar.gz