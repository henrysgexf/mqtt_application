name: CI for Linux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # ---------- 系统依赖 ----------
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libgl1-mesa-dev \
          libxkbcommon-x11-dev \
          libxcb-randr0-dev \
          libxcb-util-dev \
          libxcb-keysyms1-dev \
          libxcb-cursor-dev \
          libxcb-xinerama0-dev \
          libxcb-icccm4-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb-sync-dev \
          libxcb-xkb-dev \
          libxcb-dri3-dev \
          libx11-xcb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libxrender-dev \
          libxi-dev \
          libxrandr-dev \
          libxfixes-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libwayland-egl-backend-dev
        sudo apt install -y \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libswscale-dev \
          libswresample-dev \
          libavfilter-dev \
          libavdevice-dev

    # ---------- 安装 vcpkg（最新版） ----------
    - name: Setup vcpkg (latest)
      run: |
        VCPKG_ROOT="${{ runner.workspace }}/vcpkg"
        echo "VCPKG_ROOT=${VCPKG_ROOT}" >> $GITHUB_ENV
        echo "${VCPKG_ROOT}" >> $GITHUB_PATH

        git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
        "${VCPKG_ROOT}/bootstrap-vcpkg.sh"
        vcpkg --version

    # ---------- 创建 vcpkg.json ----------
    - name: Create vcpkg.json
      run: |
        cat > vcpkg.json << 'EOF'
        {
          "name": "mqtt-application",
          "version": "0.1.0",
          "dependencies": [
            "qtbase",
            "qtmqtt",
            "protobuf",
            "abseil"
          ]
        }
        EOF
        echo "vcpkg.json created:"
        cat vcpkg.json

    # ---------- 安装依赖（manifest 模式） ----------
    - name: Install dependencies via vcpkg (with retry)
      run: |
        function retry {
          local n=1
          local max=3
          local delay=10
          while true; do
            "$@" && break || {
              if [[ $n -lt $max ]]; then
                ((n++))
                echo "Command failed. Attempt $n/$max:"
                sleep $delay;
              else
                echo "The command has failed after $n attempts."
                return 1
              fi
            }
          done
        }
        retry vcpkg install --triplet x64-linux

    # ---------- 配置 CMake ----------
    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      env:
        VCPKG_DEFAULT_TRIPLET: x64-linux

    # ---------- 构建 ----------
    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    # ---------- 打包运行文件 ----------
    - name: Prepare runtime directory
      run: |
        mkdir -p package/usr/bin
        cp ${{ github.workspace }}/build/Application package/usr/bin/
        cp ${{ github.workspace }}/style.qss package/usr/bin/ || true

    - name: Copy system libraries (simple approach)
      run: |
        mkdir -p package/usr/lib
        ldd package/usr/bin/Application | grep "=> /" | awk '{print $3}' | xargs -I '{}' cp -v '{}' package/usr/lib/ || true
        QT_PLUGIN_PATH="${VCPKG_ROOT}/installed/x64-linux/bin/plugins"
        if [ -d "$QT_PLUGIN_PATH" ]; then
          cp -r "$QT_PLUGIN_PATH" package/usr/bin/plugins
        fi

    - name: Create run script
      run: |
        cat > package/run.sh << 'EOF'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        export LD_LIBRARY_PATH="$DIR/usr/lib:$LD_LIBRARY_PATH"
        exec "$DIR/usr/bin/Application" "$@"
        EOF
        chmod +x package/run.sh

    - name: Package into tar.gz
      run: tar -czf Application-linux-x86_64.tar.gz -C package .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Application-Linux
        path: Application-linux-x86_64.tar.gz